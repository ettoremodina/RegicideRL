env:
  num_players: 1
  reward_win: 1.0
  reward_loss: -1.0
  reward_enemy_defeated: 0.1
  reward_invalid_action: -1.0

ppo:
  learning_rate: 0.000499320956710208
  n_steps: 4096
  batch_size: 128
  n_epochs: 6
  gamma: 0.9325316491322991
  ent_coef: 0.002266137838935706
  device: "cpu"
  net_arch: [256, 256]
  pretrained_model_path: "models/ppo_bc_pretrained"

training:
  total_timesteps: 500000
  checkpoint_freq: 20000
  model_name: "ppo_regicide_tuned"
  log_dir: "runs/rl_logs"
  save_dir: "models"

tuning:
  n_trials: 5
  timesteps_per_trial: 100000

alphazero:
  action_space_size: 543
  state_dim: 56
  # MCTS
  n_simulations: 50
  c_puct: 1.5
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25
  temp_threshold: 15

  # Network
  hidden_dim: 256
  num_hidden_layers: 2
  learning_rate: 0.001
  weight_decay: 0.0001

  # Self-play & training
  games_per_iteration: 100
  eval_games: 50
  buffer_size: 50000
  batch_size: 256
  epochs_per_iteration: 10
  max_iterations: 100
  checkpoint_freq: 5
  device: "cpu"
  save_dir: "runs/alphazero"
