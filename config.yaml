env:
  num_players: 1
  reward_win: 1.0
  reward_loss: -1.0
  reward_enemy_defeated: 0.1
  reward_invalid_action: -1.0

ppo:
  learning_rate: 0.000499320956710208
  n_steps: 4096
  batch_size: 128
  n_epochs: 100
  gamma: 0.9325316491322991
  ent_coef: 0.002266137838935706
  device: "cpu"
  net_arch: [256, 256]
  pretrained_model_path: "artifacts/promoted_models/ppo_bc_pretrained"

training:
  total_timesteps: 500000
  checkpoint_freq: 20000
  model_name: "ppo_regicide_tuned"

tuning:
  n_trials: 5
  timesteps_per_trial: 100000

alphazero:
  action_space_size: 543
  state_dim: 56
  # MCTS
  n_simulations: 50
  c_puct: 1.5
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25
  temp_threshold: 15

  # Network
  hidden_dim: 256
  num_hidden_layers: 2
  learning_rate: 0.001
  weight_decay: 0.0001

  # Self-play & training
  games_per_iteration: 100
  eval_games: 50
  heuristic_warmup_iterations: 10
  heuristic_prior_weight: 0.75
  buffer_size: 50000
  batch_size: 256
  epochs_per_iteration: 10
  max_iterations: 100
  checkpoint_freq: 5
  device: "cpu"

experimental_report:
  protocol:
    games_per_agent: 100
    base_seed: 20260718
    max_decisions_per_game: 500
    confidence_level: 0.95
    bootstrap_samples: 5000
  agents:
    random:
      enabled: true
      class_path: "agents.random_agent.RandomAgent"
      label: "Random"
      family: "Baseline"
      description: "Selects uniformly from the valid actions."
      kwargs:
        name: "Random"
    heuristic:
      enabled: true
      class_path: "agents.heuristic_agent.HeuristicAgent"
      label: "Heuristic"
      family: "Rule-based"
      description: "Scores actions using strategic rules for defense, damage, suits, and card conservation."
      kwargs:
        name: "Heuristic"
    pimc:
      enabled: true
      class_path: "agents.pimc_agent.PIMCAgent"
      label: "PIMC"
      family: "Search"
      description: "Samples hidden states, runs heuristic rollouts, and selects the action with the highest mean return."
      kwargs:
        name: "PIMC"
        rollout_budget: 3000
    ismcts:
      enabled: true
      class_path: "agents.ismcts_agent.ISMCTSAgent"
      label: "ISMCTS"
      family: "Search"
      description: "Builds a tree shared across determinizations and uses UCB1 adjusted for action availability."
      kwargs:
        name: "ISMCTS"
        n_iterations: 3000
        exploration_constant: 14.14
    ppo:
      enabled: true
      class_path: "agents.ppo_agent.PPOAgent"
      label: "PPO"
      family: "Reinforcement learning"
      description: "A MaskablePPO policy trained on numeric observations and action-validity constraints."
      kwargs:
        name: "PPO"
        model_path: "artifacts/promoted_models/ppo_regicide.zip"
    alphazero:
      enabled: false
      class_path: "agents.alphazero_agent.AlphaZeroAgent"
      label: "AlphaZero"
      family: "Neural tree search"
      description: "Combines a policy-value network with PUCT-guided Monte Carlo Tree Search."
      kwargs:
        name: "AlphaZero"
        checkpoint_path: "artifacts/promoted_models/alphazero"
        n_simulations: 50
        device: "cpu"
