  height: 20px;
  margin-top: 4px;

}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);

}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);

.form-range:focus-visible::-moz-range-thumb {

.btn:not(.btn-primary, .viz-tile):is(

  height: auto;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&quot;regicide-ai-routes&quot;);
      const budget = root.querySelector(&quot;#route-budget&quot;);
      const priority = root.querySelector(&quot;#route-priority&quot;);
      const name = root.querySelector(&quot;#route-name&quot;);
      const summary = root.querySelector(&quot;#route-summary&quot;);
      const pipeline = root.querySelector(&quot;#route-pipeline&quot;);
      const detail = root.querySelector(&quot;#route-detail&quot;);
      const status = root.querySelector(&quot;#route-status&quot;);
      const recommendationButton = root.querySelector(&quot;#route-select-recommended&quot;);
      const routeButtons = [...root.querySelectorAll(&quot;[data-route]&quot;)];
      const routeRows = [...root.querySelectorAll(&quot;[data-route-row]&quot;)];

      const routes = {
        offline: {
          name: &quot;Offline ISMCTS distillation&quot;,
          summary: &quot;Keep ISMCTS fixed and test whether a compact rule model can reproduce its strongest decisions.&quot;,
          detail: &quot;Use this route to measure the white-box ceiling before changing search. It produces the cleanest experiment and the cheapest failure.&quot;,
          pipeline: [&quot;Public state&quot;, &quot;Fixed ISMCTS&quot;, &quot;Visit targets&quot;, &quot;Rule list&quot;]
        },
        policy: {
          name: &quot;Policy-only symbolic Expert Iteration&quot;,
          summary: &quot;Interpretable rules guide ISMCTS while heuristic rollouts keep leaf evaluation reliable.&quot;,
          detail: &quot;Start with symbolic action priors; add an interpretable value model only after policy fidelity and game strength are demonstrated.&quot;,
          pipeline: [&quot;Rule priors&quot;, &quot;ISMCTS&quot;, &quot;Improved visits&quot;, &quot;Updated rules&quot;]
        },
        full: {
          name: &quot;Full symbolic AlphaZero-style loop&quot;,
          summary: &quot;Separate interpretable policy and value models replace the neural apprentice while ISMCTS remains the expert.&quot;,
          detail: &quot;This is the closest white-box analogue of AlphaZero, but value approximation and feedback stability make it the highest-risk symbolic route.&quot;,
          pipeline: [&quot;Policy + value&quot;, &quot;PUCT-ISMCTS&quot;, &quot;Visits + outcome&quot;, &quot;Symbolic refit&quot;]
        },
        hybrid: {
          name: &quot;Neural discovery with symbolic distillation&quot;,
          summary: &quot;Let a flexible neural policy-value model discover strategies, then compress stable behavior into human-readable rules.&quot;,
          detail: &quot;Choose this when discovery freedom matters more than compute. The final rules may lose strength if the neural strategy depends on distributed interactions.&quot;,
          pipeline: [&quot;Neural student&quot;, &quot;PUCT-ISMCTS&quot;, &quot;Strong traces&quot;, &quot;Rule extraction&quot;]
        }
      };

      let selectedRoute = &quot;policy&quot;;
      let recommendedRoute = &quot;policy&quot;;

      function recommend() {
        const selectedBudget = budget.value;
        const selectedPriority = priority.value;
        if (selectedPriority === &quot;evidence&quot;) return &quot;offline&quot;;
        if (selectedPriority === &quot;autonomy&quot;) {
          return selectedBudget === &quot;low&quot; ? &quot;policy&quot; : &quot;hybrid&quot;;
        }
        if (selectedPriority === &quot;human&quot;) {
          return selectedBudget === &quot;high&quot; ? &quot;full&quot; : &quot;policy&quot;;
        }
        if (selectedBudget === &quot;low&quot;) return &quot;policy&quot;;
        if (selectedBudget === &quot;high&quot;) return &quot;full&quot;;
        return &quot;policy&quot;;
      }

      function renderPipeline(steps) {
        pipeline.replaceChildren();
        steps.forEach((step, index) =&gt; {
          const stepElement = document.createElement(&quot;span&quot;);
          stepElement.className = &quot;pipeline-step&quot;;
          stepElement.textContent = step;
          pipeline.appendChild(stepElement);
          if (index &lt; steps.length - 1) {
            const arrow = document.createElement(&quot;span&quot;);
            arrow.className = &quot;pipeline-arrow&quot;;
            arrow.setAttribute(&quot;aria-hidden&quot;, &quot;true&quot;);
            arrow.textContent = &quot;→&quot;;
            pipeline.appendChild(arrow);
          }
        });
      }

      function selectRoute(routeId) {
        selectedRoute = routeId;
        const route = routes[routeId];
        name.textContent = route.name;
        summary.textContent = route.summary;
        detail.textContent = route.detail;
        renderPipeline(route.pipeline);
        routeButtons.forEach((button) =&gt; {
          const selected = button.dataset.route === routeId;
          button.setAttribute(&quot;aria-pressed&quot;, String(selected));
        });
        routeRows.forEach((row) =&gt; {
          row.classList.toggle(&quot;is-selected&quot;, row.dataset.routeRow === routeId);
        });
      }

      function updateRecommendation() {
        recommendedRoute = recommend();
        const recommendationSelected = selectedRoute === recommendedRoute;
        status.textContent = recommendationSelected
          ? &quot;Recommended&quot;
          : &quot;Exploring alternative&quot;;
        recommendationButton.textContent = recommendationSelected
          ? &quot;Current recommendation&quot;
          : &quot;Select recommendation&quot;;
        recommendationButton.disabled = recommendationSelected;
      }

      routeButtons.forEach((button) =&gt; {
        button.addEventListener(&quot;click&quot;, () =&gt; {
          selectRoute(button.dataset.route);
          updateRecommendation();
        });
      });
      [budget, priority].forEach((control) =&gt; {
        control.addEventListener(&quot;change&quot;, updateRecommendation);
      });
      recommendationButton.addEventListener(&quot;click&quot;, () =&gt; {
        selectRoute(recommendedRoute);
        updateRecommendation();
      });

      selectRoute(selectedRoute);
      updateRecommendation();
    })();
  &lt;/script&gt;
