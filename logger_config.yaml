# Central runtime switches read before every ml_logger run.
version: 2

artifacts:
  root_dir: artifacts
  directories:
    - logs
    - metrics
    - artifacts
    - games
    - models
    - checkpoints
    - analysis
    - datasets

logging:
  enabled: true       # Master switch for application log messages.
  level: INFO         # DEBUG, INFO, WARNING, ERROR, or CRITICAL.
  console: true       # Show log messages in the terminal.
  file: true          # Save logs/run.log inside the run directory.

terminal:
  colors: true
  timezone: "+02:00"
  show_time: true
  show_level: true
  show_source: false
  omit_repeated_times: true
  rich_tracebacks: true

saving:
  enabled: true       # Master switch for optional logger-managed artifacts.
  params: true        # Save parameters in the manifest and event catalog.
  metrics: true       # Save metrics/metrics.jsonl.
  results: true       # Save JSON results produced through RunContext.
  artifacts: true     # Copy artifacts registered through log_artifact.
  telemetry: true     # Save numeric process and hardware telemetry.

metrics:
  include: ["*"]
  exclude: ["debug/*"]

integrations:
  regicide:
    recording:
      enabled: true
      level: actions  # summary, actions, or full.

dashboard:
  mode: auto          # auto, live, compact, or off.
  refresh_rate: 4
  max_log_lines: 50
  max_metrics: 16
  screen: true
  metrics:
    include: ["train/*", "eval/*", "loss", "win_rate", "trial_score"]
    exclude: ["debug/*"]

telemetry:
  enabled: true
  sample_interval_sec: 5
  include_process: true
  include_system: true
  gpu_provider: auto

report:
  enabled: true
  filename: run_report.html
  visualization: auto
  max_charts: 20
  metrics:
    include: ["*"]
    exclude: ["debug/*"]

# Per-run settings are merged over the global flags. These defaults prevent
# game-by-game disk I/O in high-volume workflows.
run_type_overrides:
  benchmark:
    integrations:
      regicide:
        recording:
          enabled: false
  ppo-training:
    integrations:
      regicide:
        recording:
          enabled: false
  evaluation:
    integrations:
      regicide:
        recording:
          enabled: false
  alphazero:
    integrations:
      regicide:
        recording:
          enabled: false
  hyperparameter-tuning:
    integrations:
      regicide:
        recording:
          enabled: false
  bc-data-generation:
    integrations:
      regicide:
        recording:
          enabled: false

highlights:
  - pattern: '\b(starting|started|complete|completed|saved)\b'
    style: 'bold green'
  - pattern: '\b(benchmark|summary)\b'
    style: 'bold magenta'
  - pattern: '\b(CPU|CUDA|GPU)\b'
    style: 'bold cyan'
  - pattern: '\b(on|true)\b'
    style: green
  - pattern: '\b(off|false)\b'
    style: dim
  - pattern: '\b(epoch|step)\b'
    style: 'bold magenta'
  - pattern: '\bloss\b'
    style: yellow
  - pattern: '\b(accuracy|acc|f1)\b'
    style: green
  - pattern: '\b(val|valid)\b'
    style: cyan
  - pattern: '\b(warn|warning)\b'
    style: 'bold yellow'
  - pattern: '\b(error|fail)\b'
    style: 'bold red'
  - pattern: '\b(saved|checkpoint)\b'
    style: 'bold green'
  - pattern: '(?<![\w.])[+-]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][+-]?\d+)?(?![\w.])'
    style: cyan
