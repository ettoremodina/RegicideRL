# Central runtime switches read before every ml_logger run.
version: 1

artifacts:
  root_dir: artifacts

logging:
  enabled: true       # Master switch for application log messages.
  level: INFO         # DEBUG, INFO, WARNING, ERROR, or CRITICAL.
  console: true       # Show log messages in the terminal.
  file: true          # Save logs/run.log inside the run directory.

terminal:
  colors: true
  timezone: "+02:00"
  show_time: true
  show_level: true
  show_source: false
  omit_repeated_times: true
  rich_tracebacks: true

saving:
  enabled: true       # Master switch for optional logger-managed artifacts.
  metrics: true       # Save metrics/metrics.jsonl.
  results: true       # Save JSON results produced through RunContext.
  telemetry: false    # Save hardware telemetry when using the dashboard.

games:
  enabled: true       # Save real game histories unless overridden below.
  recording_level: actions  # summary, actions, or full.

dashboard:
  refresh_rate: 4
  max_log_lines: 50
  telemetry_interval_sec: 10

# Per-run settings are merged over the global flags. These defaults prevent
# game-by-game disk I/O in high-volume workflows.
run_type_overrides:
  benchmark:
    games:
      enabled: false
  ppo-training:
    games:
      enabled: false
  evaluation:
    games:
      enabled: false
  alphazero:
    games:
      enabled: false
  hyperparameter-tuning:
    games:
      enabled: false
  bc-data-generation:
    games:
      enabled: false

highlights:
  - pattern: '\b(starting|started|complete|completed|saved)\b'
    style: 'bold green'
  - pattern: '\b(benchmark|summary)\b'
    style: 'bold magenta'
  - pattern: '\b(CPU|CUDA|GPU)\b'
    style: 'bold cyan'
  - pattern: '\b(on|true)\b'
    style: green
  - pattern: '\b(off|false)\b'
    style: dim
  - pattern: '\b(epoch|step)\b'
    style: 'bold magenta'
  - pattern: '\bloss\b'
    style: yellow
  - pattern: '\b(accuracy|acc|f1)\b'
    style: green
  - pattern: '\b(val|valid)\b'
    style: cyan
  - pattern: '\b(warn|warning)\b'
    style: 'bold yellow'
  - pattern: '\b(error|fail)\b'
    style: 'bold red'
  - pattern: '\b(saved|checkpoint)\b'
    style: 'bold green'
  - pattern: '(?<![\w.])[+-]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][+-]?\d+)?(?![\w.])'
    style: cyan
